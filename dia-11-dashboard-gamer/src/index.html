<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/styles/reset.css">
    <link rel="stylesheet" href="./assets/styles/style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside>
            <div class="menu">
                <h2>Vortex</h2>
                <span>Painel</span>
            </div>
            <nav>
                <a href="#inicio">Início</a>
                <a href="#minha-biblioteca">Minha Biblioteca</a>
                <a href="./perfil.html">Perfil / Configuração</a>
            </nav>
        </aside>
        <header>
            <div id="inicio" class="welcome">
                <h1>Olá, <strong>Player_1</strong></h1>
                <p>Bem-vindo de volta ao seu centro de comando.</p>
            </div>
            <img src="./assets/images/perfil-pixelado.png" alt="foto de perfil">
        </header>
        <div class="cards">
            <section class="status-cards">
                <h2>Status Player</h2>
                <div class="status">
                    <h3>Tempo de Jogo: 27hs essa semana</h3>
                    <h3>Latência Média: 12ms</h3>
                    <h3>Servidor Cloud: Online</h3>
                </div>
            </section>
            <hr>
            <section class="historico">
                <h2>Sessões Recentes</h2>
                <div class="jogos-recentes">
                    <img src="./assets/images/forza-horizon-5.png" alt="forza horizon 5">
                    <img src="./assets/images/genshin-impact.png" alt="genshin impact">
                    <img src="./assets/images/rocket-league.png" alt="rocket league">
                </div>
            </section>
            <hr>
            <section id="minha-biblioteca" class="minha-biblioteca">
                <h2>Minha Biblioteca</h2>
                <div class="jogos-adquiridos">
                    <img src="./assets/images/assassins-creed-shadows.png" alt="assassins creed shadows">
                    <img src="./assets/images/cyberpunk-2077.png" alt="cyberpunk 2077">
                    <img src="./assets/images/forza-horizon-5.png" alt="forza horizon 5">
                    <img src="./assets/images/genshin-impact.png" alt="genshin impact">
                    <img src="./assets/images/interplanet.png" alt="interplanet">
                    <img src="./assets/images/rocket-league.png" alt="rocket league">
                </div>
            </section>
        </div>
    </div>
</body>
</html>
