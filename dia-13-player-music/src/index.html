<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/styles/reset.css">
    <link rel="stylesheet" href="./assets/styles/style.css">
</head>
<body>
    <main>
        <div class="card">
            <div class="music">
                <img src="./assets/images/silver-for-monsters.png" alt="silver for monsters">
                <h2>Silver for Monsters...</h2>
                <p>Artista: Marcin Przybyłowicz</p>
                <div class="progresso">
                    <div class="barra-progresso">
                        <div class="barra-progresso-interna">
    
                        </div>
                    </div>
                    <div class="time">
                        <p>1:34</p>
                        <p>3:57</p>
                    </div>
                </div>
                <div class="botao-player">
                    <button><img src="./assets/images/botao-aleatorio.svg" alt="botão modo aleatório"></button>
                    <button><img src="./assets/images/botao-voltar.svg" alt="botão voltar"></button>
                    <button><img src="./assets/images/botao-play-pause.svg" alt="botão play e pause"></button>
                    <button><img src="./assets/images/botao-avancar.svg" alt="botão avançar"></button>
                    <button><img src="./assets/images/botao-repetir.svg" alt="botão modo repetição"></button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
